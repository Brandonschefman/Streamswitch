<body>
<div id="root">

// Load React first, then ReactDOM, then Babel, then run the app
function loadScript(src, cb) {
  var s = document.createElement('script');
  s.src = src;
  s.crossOrigin = 'anonymous';
  s.onload = cb;
  s.onerror = function() { showError('Script laden mislukt: ' + src); };
  document.head.appendChild(s);
}

function showError(msg) {
  var el = document.getElementById('ss-loading');
  if (el) el.innerHTML = '<div style="color:#ff3b5c;font-family:sans-serif;padding:32px;text-align:center"><div style="font-size:36px;margin-bottom:12px">⚠️</div><p style="font-size:16px;font-weight:700">Fout bij laden</p><p style="font-size:12px;margin-top:8px;color:#888;word-break:break-all">' + msg + '</p></div>';
}

var APP_CODE = '\nconst { useState, useMemo, useEffect, useCallback } = React;\n\n// ─── CONSTANTEN ───────────────────────────────────────────────────────────────\n\nconst SERVICES = [\n  { id:"netflix",   name:"Netflix",     price:17.99, color:"#E50914", icon:"🎬", url:"https://netflix.com",       deepLink:"netflix://"    },\n  { id:"prime",     name:"Prime Video", price:8.99,  color:"#00A8E0", icon:"📦", url:"https://primevideo.com",    deepLink:"aiv://"        },\n  { id:"disney",    name:"Disney+",     price:13.99, color:"#113CCF", icon:"🏰", url:"https://disneyplus.com",    deepLink:"disneyplus://" },\n  { id:"hbo",       name:"HBO Max",     price:15.99, color:"#7B2FBE", icon:"👑", url:"https://play.max.com",      deepLink:"max://"        },\n  { id:"apple",     name:"Apple TV+",   price:9.99,  color:"#888888", icon:"🍎", url:"https://tv.apple.com",      deepLink:"videos://"     },\n  { id:"videoland", name:"Videoland",   price:7.99,  color:"#FF6B00", icon:"🇳🇱", url:"https://www.videoland.com", deepLink:"videoland://"  },\n];\n\nconst TMDB_KEY  = "8a6c1e23359e4993fe7f24755991788d";\nconst TMDB_BASE = "https://api.themoviedb.org/3";\nconst TMDB_IMG  = "https://image.tmdb.org/t/p/w500";\nconst TMDB_PROV = [\n  { tmdbId:8,   serviceId:"netflix"   },\n  { tmdbId:119, serviceId:"prime"     },\n  { tmdbId:337, serviceId:"disney"    },\n  { tmdbId:384, serviceId:"hbo"       },\n  { tmdbId:350, serviceId:"apple"     },\n  { tmdbId:39,  serviceId:"videoland" },\n];\n\nconst MONTHS = ["Jan","Feb","Mrt","Apr","Mei","Jun","Jul","Aug","Sep","Okt","Nov","Dec"];\n\nconst G = {\n  bg:"#08080f", surface:"#101018", card:"#14141f", border:"#1e1e2e",\n  accent:"#00e5a0", warn:"#ff6b35", danger:"#ff3b5c",\n  text:"#f0f0f8", muted:"#5a5a7a", premium:"#f7c948",\n};\n\n// ─── HELPERS ──────────────────────────────────────────────────────────────────\n\nconst genId    = () => Math.random().toString(36).slice(2,9);\nconst addDays  = (n) => { const d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().split("T")[0]; };\nconst daysLeft = (s) => { if(!s) return 999; return Math.ceil((new Date(s)-new Date())/86400000); };\nconst fmt      = (n) => n!=null ? `€${Number(n).toFixed(0)}` : "—";\nconst svc      = (id) => SERVICES.find(s=>s.id===id) || SERVICES[0];\n\nconst LS = {\n  get:(k,d)=>{ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):d; }catch{ return d; } },\n  set:(k,v)=>{ try{ localStorage.setItem(k,JSON.stringify(v)); }catch{} },\n};\n\n// ── Binge berekening ──────────────────────────────────────────────────────────\n// Geeft terug hoeveel weken nodig zijn om een show af te kijken\n// en hoeveel abonnementsmaanden dat betekent\nconst calcBinge = (episodes, epDuration, eveningsPerWeek, minsPerEvening=120) => {\n  if (!episodes || episodes < 1) return null;\n  const totalMins   = episodes * epDuration;\n  const minsPerWeek = eveningsPerWeek * minsPerEvening;\n  const weeks       = Math.ceil(totalMins / minsPerWeek);\n  const months      = Math.ceil(weeks / 4.3);\n  return { totalMins, weeks, months };\n};\n\n// ── Centrale besparingsberekening ────────────────────────────────────────────\nconst calcSavings = (subs, plan) => {\n  const huidigJaar = subs.reduce((s,a)=>s+a.price,0)*12;\n  if (!plan?.length) return { huidigJaar, strategieJaar:null, besparing:null };\n  const strategieJaar = plan.filter(m=>m.type==="active").reduce((s,m)=>s+m.price,0);\n  return { huidigJaar, strategieJaar, besparing:Math.max(0,huidigJaar-strategieJaar) };\n};\n\n// ── Deep link opener ──────────────────────────────────────────────────────────\nconst openApp = (url, deepLink) => {\n  const mob = /iphone|ipad|ipod|android/i.test(navigator.userAgent);\n  if (!mob||!deepLink) { window.open(url,"_blank"); return; }\n  const a=document.createElement("a"); a.href=deepLink; a.style.display="none";\n  document.body.appendChild(a); a.click(); document.body.removeChild(a);\n  const t=setTimeout(()=>window.open(url,"_blank"),1800);\n  window.addEventListener("blur",()=>clearTimeout(t),{once:true});\n};\n\n// ─── DEFAULT DATA ─────────────────────────────────────────────────────────────\n\nconst DEF_SUBS = [\n  { id:"s1", serviceId:"netflix", name:"Netflix", price:17.99, color:"#E50914", icon:"🎬", url:"https://netflix.com", renewalDate:addDays(4),  autoRenew:true },\n  { id:"s2", serviceId:"disney",  name:"Disney+", price:13.99, color:"#113CCF", icon:"🏰", url:"https://disneyplus.com", renewalDate:addDays(18), autoRenew:true },\n];\nconst DEF_WL = [\n  { id:"w1", title:"The Bear",    platform:"disney", type:"series",  episodes:18, epDuration:45, seasons:2, status:"watching",   evenings:3 },\n  { id:"w2", title:"Oppenheimer", platform:"prime",  type:"movie",   episodes:1,  epDuration:180,seasons:1, status:"not_started",evenings:3 },\n  { id:"w3", title:"Succession",  platform:"hbo",    type:"series",  episodes:39, epDuration:60, seasons:4, status:"finished",   evenings:3 },\n];\n\n// ─── SVG ICONEN ───────────────────────────────────────────────────────────────\n\nconst IC = {\n  dashboard:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>`,\n  subs:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>`,\n  list:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1.5" fill="currentColor" stroke="none"/><circle cx="3" cy="12" r="1.5" fill="currentColor" stroke="none"/><circle cx="3" cy="18" r="1.5" fill="currentColor" stroke="none"/></svg>`,\n  film:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="2"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="2" y1="7" x2="7" y2="7"/><line x1="17" y1="7" x2="22" y2="7"/><line x1="17" y1="17" x2="22" y2="17"/><line x1="2" y1="17" x2="7" y2="17"/></svg>`,\n  switch:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>`,\n  settings: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,\n  trash:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/><path d="M9 6V4h6v2"/></svg>`,\n  edit:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,\n  open:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>`,\n  crown:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 20h18"/><path d="M5 20V10l7-6 7 6v10"/></svg>`,\n  check:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg>`,\n  plus:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,\n  lock:     `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`,\n  eye:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,\n  eyeoff:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`,\n  arrow:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>`,\n  star:     `<svg viewBox="0 0 24 24" fill="#f7c948" stroke="none"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`,\n  x:        `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,\n  clock:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,\n  zap:      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,\n};\n\nconst Ico = ({n,size=16}) => (\n  <span style={{display:"inline-flex",alignItems:"center",width:size,height:size,flexShrink:0}}\n    dangerouslySetInnerHTML={{__html:`<svg width="${size}" height="${size}" ${IC[n]?.slice(4)}`}} />\n);\n\nconst Toggle = ({value,onChange,disabled=false}) => (\n  <button onClick={()=>!disabled&&onChange(!value)}\n    style={{width:46,height:26,borderRadius:13,border:"none",cursor:disabled?"not-allowed":"pointer",\n      background:value&&!disabled?G.accent:G.border,transition:"background .18s",\n      position:"relative",flexShrink:0,opacity:disabled?0.4:1}}>\n    <div style={{width:20,height:20,borderRadius:"50%",background:"white",position:"absolute",\n      top:3,left:value&&!disabled?23:3,transition:"left .18s"}}/>\n  </button>\n);\n\n// ─── CSS ──────────────────────────────────────────────────────────────────────\n\nconst CSS = "";\n\n// ─── BINGE CALCULATOR COMPONENT ───────────────────────────────────────────────\n\nfunction BingeCalc({ episodes, epDuration, setEpDuration, evenings, setEvenings, result }) {\n  if (!episodes || episodes < 2) return null;\n  return (\n    <div className="binge-box" style={{marginTop:14}}>\n      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>\n        <Ico n="clock" size={16}/>\n        <p style={{fontWeight:700,fontSize:14,color:G.accent}}>Binge Calculator</p>\n      </div>\n\n      <div style={{marginBottom:12}}>\n        <label className="lbl">Afleveringsduur</label>\n        <div style={{display:"flex",gap:8}}>\n          {[30,45,60].map(m=>(\n            <button key={m} className="btn bsm" onClick={()=>setEpDuration(m)}\n              style={{flex:1,background:epDuration===m?G.accent:G.border,color:epDuration===m?"#08080f":G.text}}>\n              {m} min\n            </button>\n          ))}\n        </div>\n      </div>\n\n      <div style={{marginBottom:12}}>\n        <label className="lbl">Avonden per week: <strong style={{color:G.text}}>{evenings}</strong></label>\n        <input type="range" min={1} max={7} value={evenings} onChange={e=>setEvenings(Number(e.target.value))}/>\n        <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:G.muted,marginTop:4}}>\n          <span>1 avond</span><span>7 avonden</span>\n        </div>\n      </div>\n\n      {result && (\n        <div style={{background:"rgba(0,229,160,.08)",border:"1px solid rgba(0,229,160,.2)",borderRadius:12,padding:12,textAlign:"center"}}>\n          <p style={{fontSize:13,color:G.muted,marginBottom:4}}>\n            {episodes} afl. × {epDuration} min = <strong style={{color:G.text}}>{Math.round(result.totalMins/60)}u {result.totalMins%60}m</strong> totaal\n          </p>\n          <p style={{fontSize:16,fontWeight:800,color:G.accent}}>\n            ≈ {result.weeks} {result.weeks===1?"week":"weken"} om af te kijken\n          </p>\n          <p style={{fontSize:12,color:G.muted,marginTop:4}}>\n            → Aanbevolen: <strong style={{color:G.text}}>{result.months} maand{result.months!==1?"en":""}</strong> abonnement\n          </p>\n        </div>\n      )}\n    </div>\n  );\n}\n\n// ─── WATCHLIST ITEM KAARTJE ───────────────────────────────────────────────────\n\nfunction WatchCard({ item, onEdit, onDelete, onToggleWatched }) {\n  const service  = svc(item.platform);\n  const binge    = item.type==="series" ? calcBinge(item.episodes, item.epDuration||45, item.evenings||3) : null;\n  const watched  = item.status==="finished";\n  const watching = item.status==="watching";\n\n  return (\n    <div className="card" style={{marginBottom:10,padding:16,opacity:watched?0.55:1}}>\n      <div style={{display:"flex",alignItems:"flex-start",gap:12}}>\n        <div style={{width:48,height:48,borderRadius:12,background:service.color+"22",border:`2px solid ${service.color}40`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,flexShrink:0}}>\n          {service.icon}\n        </div>\n        <div style={{flex:1,minWidth:0}}>\n          <p style={{fontWeight:700,fontSize:15,textDecoration:watched?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.title}</p>\n          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:5}}>\n            <span className="tag ti" style={{fontSize:10}}>{service.name}</span>\n            <span className="tag ti" style={{fontSize:10}}>{item.type==="movie"?"🎬 Film":"📺 Serie"}</span>\n            {watching && <span className="tag tl" style={{fontSize:10}}>▶ Bezig</span>}\n            {watched  && <span className="tag ta" style={{fontSize:10}}>✓ Klaar</span>}\n          </div>\n        </div>\n        <div style={{display:"flex",flexDirection:"column",gap:6}}>\n          <button className="ib" onClick={()=>onEdit(item)}><Ico n="edit"/></button>\n          <button className="ib ib-del" onClick={()=>onDelete(item.id)}><Ico n="trash"/></button>\n        </div>\n      </div>\n\n      {/* Binge info */}\n      {binge && !watched && (\n        <div style={{marginTop:10,padding:"10px 12px",background:G.surface,borderRadius:12,border:`1px solid ${G.border}`}}>\n          <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:4}}>\n            <Ico n="clock" size={12}/>\n            <p style={{fontSize:12,color:G.muted}}>Geschatte kijktijd</p>\n          </div>\n          <p style={{fontSize:13,fontWeight:700,color:G.accent}}>{binge.weeks} weken · {binge.months} maand{binge.months!==1?"en":""} {service.name}</p>\n          {binge.months > 1 && (\n            <p style={{fontSize:11,color:G.muted,marginTop:2}}>💡 Plan {binge.months} opeenvolgende maanden {service.name}</p>\n          )}\n        </div>\n      )}\n\n      {/* Markeer als gekeken */}\n      {!watched && (\n        <button className="btn bg" style={{width:"100%",marginTop:10,padding:"8px",fontSize:13}}\n          onClick={()=>onToggleWatched(item.id,watched)}>\n          {watching ? "✅ Markeer als klaar" : "▶ Begin met kijken"}\n        </button>\n      )}\n    </div>\n  );\n}\n\n// ─── WATCHLIST SHEET ──────────────────────────────────────────────────────────\n\nfunction WatchSheet({ item, onSave, onClose }) {\n  const [form, setForm] = useState(item || {\n    title:"", platform:"netflix", type:"series",\n    episodes:10, epDuration:45, seasons:1, status:"not_started", evenings:3\n  });\n\n  const upd = (k,v) => setForm(f=>({...f,[k]:v}));\n  const binge = form.type==="series" ? calcBinge(form.episodes, form.epDuration, form.evenings) : null;\n\n  return (\n    <div className="ov" onClick={e=>e.target===e.currentTarget&&onClose()}>\n      <div className="sh">\n        <div className="hndl"/>\n        <h3 style={{fontWeight:800,fontSize:18,marginBottom:18}}>{item?"Bewerken":"Toevoegen"}</h3>\n        <div style={{display:"flex",flexDirection:"column",gap:13}}>\n\n          <div><label className="lbl">Titel</label>\n            <input className="inp" placeholder="Bijv. The Bear" value={form.title} onChange={e=>upd("title",e.target.value)}/>\n          </div>\n\n          <div><label className="lbl">Streamingdienst</label>\n            <select className="inp" value={form.platform} onChange={e=>upd("platform",e.target.value)}>\n              {SERVICES.map(s=><option key={s.id} value={s.id}>{s.icon} {s.name}</option>)}\n            </select>\n          </div>\n\n          <div><label className="lbl">Type</label>\n            <div style={{display:"flex",gap:8}}>\n              {[{v:"series",l:"📺 Serie"},{v:"movie",l:"🎬 Film"}].map(({v,l})=>(\n                <button key={v} className="btn bsm" style={{flex:1,background:form.type===v?G.accent:G.border,color:form.type===v?"#08080f":G.text}}\n                  onClick={()=>upd("type",v)}>{l}</button>\n              ))}\n            </div>\n          </div>\n\n          {form.type==="series" && <>\n            <div style={{display:"flex",gap:10}}>\n              <div style={{flex:1}}><label className="lbl">Afleveringen</label>\n                <input className="inp" type="text" inputMode="numeric" placeholder="10" value={form.episodes}\n                  onChange={e=>upd("episodes",parseInt(e.target.value)||0)}/>\n              </div>\n              <div style={{flex:1}}><label className="lbl">Seizoenen</label>\n                <input className="inp" type="text" inputMode="numeric" placeholder="1" value={form.seasons}\n                  onChange={e=>upd("seasons",parseInt(e.target.value)||1)}/>\n              </div>\n            </div>\n            <BingeCalc\n              episodes={form.episodes}\n              epDuration={form.epDuration}\n              setEpDuration={v=>upd("epDuration",v)}\n              evenings={form.evenings}\n              setEvenings={v=>upd("evenings",v)}\n              result={binge}\n            />\n          </>}\n\n          <div style={{display:"flex",gap:8,marginTop:4}}>\n            <button className="btn bp" style={{flex:1,padding:"13px"}} onClick={()=>{ if(form.title.trim()) onSave(form); }}>\n              {item?"Opslaan":"Toevoegen"}\n            </button>\n            <button className="btn bg" style={{flex:1}} onClick={onClose}>Annuleren</button>\n          </div>\n        </div>\n      </div>\n    </div>\n  );\n}\n\n// ─── WATCHLIST SCREEN ─────────────────────────────────────────────────────────\n\nfunction WatchScreen({ watchlist, setWatchlist }) {\n  const [showSheet, setShowSheet]   = useState(false);\n  const [editItem,  setEditItem]    = useState(null);\n  const [filter,    setFilter]      = useState("all"); // all | not_started | watching | finished\n\n  const save = (form) => {\n    const updated = { ...form, id: editItem?.id || genId() };\n    setWatchlist(prev => {\n      const next = editItem ? prev.map(x=>x.id===editItem.id?updated:x) : [...prev, updated];\n      LS.set("ss_watchlist", next);\n      return next;\n    });\n    setShowSheet(false); setEditItem(null);\n  };\n\n  const del = (id) => setWatchlist(prev=>{ const n=prev.filter(x=>x.id!==id); LS.set("ss_watchlist",n); return n; });\n\n  const toggleWatched = (id, wasWatched) => setWatchlist(prev=>{\n    const n = prev.map(x=>x.id===id ? {...x, status: wasWatched?"not_started":x.status==="watching"?"finished":"watching"} : x);\n    LS.set("ss_watchlist",n); return n;\n  });\n\n  const filters = [\n    { v:"all",         l:"Alles",    count: watchlist.length },\n    { v:"not_started", l:"Te kijken",count: watchlist.filter(w=>w.status==="not_started").length },\n    { v:"watching",    l:"Bezig",    count: watchlist.filter(w=>w.status==="watching").length },\n    { v:"finished",    l:"Klaar",    count: watchlist.filter(w=>w.status==="finished").length },\n  ];\n\n  const filtered = filter==="all" ? watchlist : watchlist.filter(w=>w.status===filter);\n\n  return (\n    <div className="scr fu">\n      <div style={{padding:"20px 0 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>\n        <h2 style={{fontSize:22,fontWeight:800,letterSpacing:"-0.5px"}}>Watchlist</h2>\n        <button className="btn bp bsm" onClick={()=>{setEditItem(null);setShowSheet(true);}}><Ico n="plus"/> Toevoegen</button>\n      </div>\n\n      {/* Filter tabs */}\n      <div className="mrow" style={{marginBottom:14}}>\n        {filters.map(f=>(\n          <button key={f.v} onClick={()=>setFilter(f.v)}\n            style={{flexShrink:0,padding:"7px 14px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:"Outfit,sans-serif",fontWeight:600,fontSize:12,\n              background:filter===f.v?G.accent:G.border,color:filter===f.v?"#08080f":G.text}}>\n            {f.l} {f.count>0&&<span style={{opacity:.7}}>({f.count})</span>}\n          </button>\n        ))}\n      </div>\n\n      {filtered.length===0 && (\n        <div className="card" style={{padding:40,textAlign:"center",color:G.muted}}>\n          <p style={{fontSize:40,marginBottom:12}}>🎬</p>\n          <p style={{fontWeight:600,color:G.text,marginBottom:6}}>Nog niks hier</p>\n          <p style={{fontSize:14}}>Voeg een film of serie toe om te beginnen</p>\n        </div>\n      )}\n\n      {filtered.map(item=>(\n        <WatchCard key={item.id} item={item}\n          onEdit={i=>{setEditItem(i);setShowSheet(true);}}\n          onDelete={del}\n          onToggleWatched={toggleWatched}\n        />\n      ))}\n\n      {showSheet && <WatchSheet item={editItem} onSave={save} onClose={()=>{setShowSheet(false);setEditItem(null);}}/>}\n    </div>\n  );\n}\n\n// ─── DASHBOARD ────────────────────────────────────────────────────────────────\n\nfunction Dashboard({ user, subs, watchlist, savings, totalMonthly, getStatus, setSubs, setTab, upgradePremium }) {\n  const warnings = subs.filter(s=>daysLeft(s.renewalDate)<=7);\n  const activeWL = watchlist.filter(w=>w.status!=="finished");\n  const totalBingeMonths = activeWL.reduce((sum,item)=>{\n    if (item.type!=="series") return sum;\n    const b = calcBinge(item.episodes, item.epDuration||45, item.evenings||3);\n    return sum + (b?.months||0);\n  }, 0);\n\n  return (\n    <div className="scr fu">\n      <div style={{padding:"20px 0 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>\n        <div>\n          <p style={{fontSize:13,color:G.muted}}>Welkom terug 👋</p>\n          <h2 style={{fontSize:22,fontWeight:800,letterSpacing:"-0.5px"}}>{user.email.split("@")[0]}</h2>\n        </div>\n        {user.isPremium\n          ? <span className="tag tp"><Ico n="crown" size={13}/> Premium</span>\n          : <button className="btn bg bsm" style={{color:G.premium,background:"#2a2000"}} onClick={()=>setTab("settings")}>✨ Upgrade</button>}\n      </div>\n\n      {/* Verlengingswaarschuwingen */}\n      {warnings.map(sub=>{\n        const days = daysLeft(sub.renewalDate);\n        const st   = getStatus(sub);\n        const urgent = days<=5 && st.label==="Laag gebruik";\n        return (\n          <div key={sub.id} className={urgent?"warnbox":"card"} style={{marginBottom:10,padding:"14px 16px"}}>\n            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:urgent?12:0}}>\n              <span style={{fontSize:22}}>{sub.icon}</span>\n              <div style={{flex:1}}>\n                <p style={{fontWeight:700,fontSize:14}}>⚠️ {sub.name} verlengt over {days} dag{days!==1?"en":""}</p>\n                {urgent&&<p style={{fontSize:12,color:G.muted,marginTop:2}}>Geen recente activiteit</p>}\n              </div>\n            </div>\n            {urgent&&<div style={{display:"flex",gap:8}}>\n              <button className="btn bd bsm" onClick={()=>setSubs(p=>{const n=p.filter(s=>s.id!==sub.id);LS.set("ss_subs",n);return n;})}>Annuleren</button>\n              <button className="btn bg bsm">Behouden</button>\n            </div>}\n          </div>\n        );\n      })}\n\n      {/* Kosten kaart */}\n      <div className="card" style={{padding:22,marginBottom:12}}>\n        <p style={{fontSize:12,color:G.muted,marginBottom:4}}>Totaal per maand</p>\n        <p style={{fontSize:42,fontWeight:900,letterSpacing:"-2px"}}>\n          €{totalMonthly.toFixed(2).replace(".",",")}\n          <span style={{fontSize:16,color:G.muted,fontWeight:400}}>/mnd</span>\n        </p>\n        <div className="sep"/>\n        <div style={{display:"flex",justifyContent:"space-between"}}>\n          <div><p style={{fontSize:11,color:G.muted}}>Huidig per jaar</p><p style={{fontWeight:700,fontSize:18}}>{fmt(savings.huidigJaar)}</p></div>\n          <div style={{textAlign:"right"}}><p style={{fontSize:11,color:G.muted}}>Met Switch Strategy</p>\n            <p style={{fontWeight:700,fontSize:18,color:G.accent}}>{savings.strategieJaar!==null?fmt(savings.strategieJaar):"Genereer plan →"}</p></div>\n        </div>\n      </div>\n\n      {/* Besparing hero */}\n      <div className="hero" style={{marginBottom:12}}>\n        {savings.besparing!==null?(\n          <>\n            <p style={{fontSize:13,color:"#7abf9a",marginBottom:6}}>Besparing met Switch Strategy</p>\n            <div className="heroamt">{fmt(savings.besparing)}</div>\n            <p style={{fontSize:13,color:"#7abf9a",marginTop:6}}>per jaar · gebaseerd op jouw planning</p>\n          </>\n        ):(\n          <>\n            <p style={{fontSize:13,color:"#7abf9a",marginBottom:6}}>Potentiële besparing</p>\n            <div className="heroamt">{fmt(savings.huidigJaar*0.5)}</div>\n            <p style={{fontSize:13,color:"#7abf9a",marginTop:6}}>per jaar · genereer een Switch Plan voor exacte cijfers</p>\n          </>\n        )}\n        {!user.isPremium&&<button className="btn bp" style={{marginTop:16}} onClick={()=>setTab("switch")}>Bekijk hoe →</button>}\n      </div>\n\n      {/* Watchlist samenvatting */}\n      {activeWL.length>0&&(\n        <div className="card" style={{padding:16,marginBottom:12}}>\n          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>\n            <p style={{fontWeight:700,fontSize:15}}>Watchlist samenvatting</p>\n            <button className="btn bg bsm" onClick={()=>setTab("watchlist")}>Bekijk alles</button>\n          </div>\n          <div style={{display:"flex",gap:16}}>\n            <div style={{textAlign:"center",flex:1}}>\n              <p style={{fontSize:28,fontWeight:900,color:G.accent}}>{activeWL.length}</p>\n              <p style={{fontSize:11,color:G.muted}}>Te kijken</p>\n            </div>\n            <div style={{width:1,background:G.border}}/>\n            <div style={{textAlign:"center",flex:1}}>\n              <p style={{fontSize:28,fontWeight:900,color:G.premium}}>{totalBingeMonths}</p>\n              <p style={{fontSize:11,color:G.muted}}>Maanden nodig</p>\n            </div>\n            <div style={{width:1,background:G.border}}/>\n            <div style={{textAlign:"center",flex:1}}>\n              <p style={{fontSize:28,fontWeight:900,color:G.warn}}>{new Set(activeWL.map(w=>w.platform)).size}</p>\n              <p style={{fontSize:11,color:G.muted}}>Diensten</p>\n            </div>\n          </div>\n        </div>\n      )}\n\n      {/* Abonnementen preview */}\n      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>\n        <p style={{fontWeight:700,fontSize:16}}>Abonnementen</p>\n        <button className="btn bg bsm" onClick={()=>setTab("subs")}>Alles zien</button>\n      </div>\n      {subs.slice(0,3).map(sub=>{\n        const days = daysLeft(sub.renewalDate);\n        const st   = getStatus(sub);\n        return (\n          <div key={sub.id} className="card cardh" style={{padding:"14px 16px",marginBottom:8,display:"flex",alignItems:"center",gap:12}} onClick={()=>setTab("subs")}>\n            <div style={{width:44,height:44,borderRadius:12,background:sub.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,flexShrink:0}}>{sub.icon}</div>\n            <div style={{flex:1}}>\n              <p style={{fontWeight:700}}>{sub.name}</p>\n              <p style={{fontSize:12,color:G.muted}}>Verlengt over {days} dag{days!==1?"en":""}</p>\n            </div>\n            <div style={{textAlign:"right"}}>\n              <p style={{fontWeight:700}}>€{sub.price.toFixed(2)}</p>\n              <span className={`tag ${st.cls}`}><span className="dot" style={{background:st.dot}}/>{st.label}</span>\n            </div>\n          </div>\n        );\n      })}\n    </div>\n  );\n}\n\n// ─── SUBS SCREEN ──────────────────────────────────────────────────────────────\n\nfunction SubsScreen({ subs, setSubs, watchlist, savings, totalMonthly, getStatus, openAddSub, openEditSub }) {\n  return (\n    <div className="scr fu">\n      <div style={{padding:"20px 0 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>\n        <h2 style={{fontSize:22,fontWeight:800,letterSpacing:"-0.5px"}}>Abonnementen</h2>\n        <button className="btn bp bsm" onClick={openAddSub}><Ico n="plus"/> Toevoegen</button>\n      </div>\n      <div className="card" style={{padding:"14px 16px",marginBottom:14,display:"flex",justifyContent:"space-between"}}>\n        <div><p style={{fontSize:11,color:G.muted}}>Maandelijks</p><p style={{fontWeight:800,fontSize:20}}>€{totalMonthly.toFixed(2)}</p></div>\n        <div style={{textAlign:"right"}}><p style={{fontSize:11,color:G.muted}}>Huidig per jaar</p><p style={{fontWeight:800,fontSize:20}}>{fmt(savings.huidigJaar)}</p></div>\n      </div>\n      {subs.length===0&&<div className="card" style={{padding:40,textAlign:"center",color:G.muted}}><p style={{fontSize:40,marginBottom:12}}>📭</p><p>Geen abonnementen. Voeg er een toe!</p></div>}\n      {subs.map(sub=>{\n        const days=daysLeft(sub.renewalDate);\n        const st=getStatus(sub);\n        const wlCount=watchlist.filter(w=>w.platform===sub.serviceId&&w.status!=="finished").length;\n        return (\n          <div key={sub.id} className="card" style={{marginBottom:10,padding:16}}>\n            <div style={{display:"flex",alignItems:"center",gap:12}}>\n              <div style={{width:52,height:52,borderRadius:14,background:sub.color+"20",border:`2px solid ${sub.color}50`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,flexShrink:0}}>{sub.icon}</div>\n              <div style={{flex:1}}>\n                <p style={{fontWeight:700,fontSize:16}}>{sub.name}</p>\n                <p style={{fontSize:12,color:G.muted,marginTop:2}}>Verlengt {days<=0?"vandaag":`over ${days} dagen`} · {wlCount} titel{wlCount!==1?"s":""}</p>\n              </div>\n              <div style={{textAlign:"right"}}>\n                <p style={{fontWeight:800,fontSize:18}}>€{sub.price.toFixed(2)}</p>\n                <p style={{fontSize:11,color:G.muted}}>/mnd</p>\n              </div>\n            </div>\n            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:12}}>\n              <span className={`tag ${st.cls}`}><span className="dot" style={{background:st.dot}}/>{st.label}</span>\n              <div style={{display:"flex",gap:6}}>\n                <button className="ib" title="App openen" onClick={()=>openApp(sub.url,SERVICES.find(p=>p.id===sub.serviceId)?.deepLink)}><Ico n="open"/></button>\n                <button className="ib" onClick={()=>openEditSub(sub)}><Ico n="edit"/></button>\n                <button className="ib ib-del" onClick={()=>setSubs(p=>{const n=p.filter(s=>s.id!==sub.id);LS.set("ss_subs",n);return n;})}><Ico n="trash"/></button>\n              </div>\n            </div>\n          </div>\n        );\n      })}\n    </div>\n  );\n}\n\n// ─── NIEUWS SCREEN ────────────────────────────────────────────────────────────\n\nfunction NewsScreen({ watchlist, setWatchlist, subs }) {\n  const [items,   setItems]   = useState([]);\n  const [loading, setLoading] = useState(false);\n  const [error,   setError]   = useState("");\n  const [filter,  setFilter]  = useState("all");\n  const [type,    setType]    = useState("movie");\n  const [detail,  setDetail]  = useState(null);\n  const [added,   setAdded]   = useState({});\n  const wlTitles = new Set(watchlist.map(w=>w.title.toLowerCase()));\n\n  const fetchNews = async (mediaType, providerId) => {\n    setLoading(true); setError("");\n    try {\n      const url = providerId==="all"\n        ? `${TMDB_BASE}/discover/${mediaType}?api_key=${TMDB_KEY}&language=nl-NL&sort_by=popularity.desc&watch_region=NL&with_watch_monetization_types=flatrate`\n        : `${TMDB_BASE}/discover/${mediaType}?api_key=${TMDB_KEY}&language=nl-NL&sort_by=popularity.desc&watch_region=NL&with_watch_providers=${providerId}&with_watch_monetization_types=flatrate`;\n      const res  = await fetch(url);\n      if (!res.ok) throw new Error();\n      const data = await res.json();\n      setItems(data.results?.slice(0,20)||[]);\n    } catch { setError("Nieuws laden mislukt."); }\n    finally  { setLoading(false); }\n  };\n\n  useEffect(()=>{ fetchNews("movie","all"); },[]);\n\n  const handleFilter = (f)=>{ setFilter(f); const p=TMDB_PROV.find(x=>x.serviceId===f); fetchNews(type,p?p.tmdbId:"all"); };\n  const handleType   = (t)=>{ setType(t);   const p=TMDB_PROV.find(x=>x.serviceId===filter); fetchNews(t,p?p.tmdbId:"all"); };\n\n  const addToWatchlist = (item) => {\n    const title    = item.title||item.name||"Onbekend";\n    const platform = TMDB_PROV.find(x=>x.serviceId===filter)?.serviceId || "netflix";\n    const newItem  = { id:genId(), title, platform, type:type==="movie"?"movie":"series", episodes:type==="movie"?1:10, epDuration:45, seasons:1, status:"not_started", evenings:3 };\n    setWatchlist(prev=>{ const n=[...prev,newItem]; LS.set("ss_watchlist",n); return n; });\n    setAdded(a=>({...a,[item.id]:true}));\n    setDetail(null);\n  };\n\n  const isAdded = (item) => added[item.id]||wlTitles.has((item.title||item.name||"").toLowerCase());\n  const myProvs = TMDB_PROV.filter(p=>subs.some(s=>s.serviceId===p.serviceId)).map(p=>({...p,...SERVICES.find(s=>s.id===p.serviceId)}));\n\n  return (\n    <div className="scr fu">\n      <div style={{padding:"20px 0 14px"}}>\n        <h2 style={{fontSize:22,fontWeight:800,letterSpacing:"-0.5px"}}>Nieuws</h2>\n        <p style={{fontSize:13,color:G.muted,marginTop:2}}>Nieuwe films & series op jouw diensten</p>\n      </div>\n      <div style={{display:"flex",background:G.surface,borderRadius:12,padding:4,border:`1px solid ${G.border}`,marginBottom:12}}>\n        {[{v:"movie",l:"🎬 Films"},{v:"tv",l:"📺 Series"}].map(({v,l})=>(\n          <button key={v} onClick={()=>handleType(v)} style={{flex:1,padding:"9px",border:"none",cursor:"pointer",fontFamily:"Outfit,sans-serif",fontWeight:600,fontSize:14,borderRadius:9,background:type===v?G.card:"transparent",color:type===v?G.text:G.muted}}>{l}</button>\n        ))}\n      </div>\n      <div className="mrow" style={{marginBottom:14}}>\n        <button onClick={()=>handleFilter("all")} style={{flexShrink:0,padding:"7px 14px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:"Outfit,sans-serif",fontWeight:600,fontSize:12,background:filter==="all"?G.accent:G.border,color:filter==="all"?"#08080f":G.text}}>Alles</button>\n        {myProvs.map(p=>(\n          <button key={p.serviceId} onClick={()=>handleFilter(p.serviceId)} style={{flexShrink:0,padding:"7px 14px",borderRadius:20,border:"none",cursor:"pointer",fontFamily:"Outfit,sans-serif",fontWeight:600,fontSize:12,background:filter===p.serviceId?p.color:G.border,color:filter===p.serviceId?"white":G.text}}>{p.icon} {p.name}</button>\n        ))}\n      </div>\n      {loading&&<div style={{textAlign:"center",padding:"60px 0",color:G.muted}}><p style={{fontSize:40,marginBottom:12}}>⏳</p><p>Laden...</p></div>}\n      {error&&<div className="card" style={{padding:20,textAlign:"center",color:G.danger}}><p>{error}</p><button className="btn bg" style={{marginTop:12}} onClick={()=>handleFilter(filter)}>Opnieuw</button></div>}\n      {!loading&&!error&&(\n        <div className="pgrid">\n          {items.map(item=>{\n            const title  = item.title||item.name||"Onbekend";\n            const poster = item.poster_path?`${TMDB_IMG}${item.poster_path}`:null;\n            const rating = item.vote_average?item.vote_average.toFixed(1):"?";\n            const year   = (item.release_date||item.first_air_date||"").slice(0,4);\n            const al     = isAdded(item);\n            return (\n              <div key={item.id} className="card" style={{overflow:"hidden",cursor:"pointer"}} onClick={()=>setDetail(item)}>\n                <div style={{width:"100%",aspectRatio:"2/3",background:G.surface,position:"relative",overflow:"hidden"}}>\n                  {poster?<img src={poster} alt={title} style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<div style={{width:"100%",height:"100%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:40}}>🎬</div>}\n                  <div style={{position:"absolute",top:8,left:8,background:"rgba(0,0,0,.75)",borderRadius:8,padding:"3px 7px",display:"flex",alignItems:"center",gap:3}}>\n                    <Ico n="star" size={10}/><span style={{fontSize:11,fontWeight:700,color:"#f7c948"}}>{rating}</span>\n                  </div>\n                  {al&&<div style={{position:"absolute",top:8,right:8,background:G.accent,borderRadius:8,padding:"3px 7px"}}><span style={{fontSize:10,fontWeight:700,color:"#08080f"}}>✓</span></div>}\n                </div>\n                <div style={{padding:"10px 10px 12px"}}>\n                  <p style={{fontWeight:700,fontSize:13,lineHeight:1.3,marginBottom:4}}>{title}</p>\n                  <p style={{fontSize:11,color:G.muted,marginBottom:8}}>{year}</p>\n                  <button className="btn" style={{width:"100%",padding:"7px",fontSize:12,borderRadius:9,background:al?G.border:G.accent,color:al?G.muted:"#08080f",fontWeight:700}}\n                    onClick={e=>{e.stopPropagation();if(!al)addToWatchlist(item);}}>{al?"✓ Toegevoegd":"+ Watchlist"}</button>\n                </div>\n              </div>\n            );\n          })}\n        </div>\n      )}\n      {detail&&(\n        <div className="ov" onClick={e=>e.target===e.currentTarget&&setDetail(null)}>\n          <div className="sh">\n            <div style={{display:"flex",justifyContent:"flex-end",marginBottom:16}}><button className="ib" onClick={()=>setDetail(null)}><Ico n="x"/></button></div>\n            <div style={{display:"flex",gap:14,marginBottom:16}}>\n              {detail.poster_path?<img src={`${TMDB_IMG}${detail.poster_path}`} alt="" style={{width:90,height:135,borderRadius:12,objectFit:"cover",flexShrink:0}}/>:<div style={{width:90,height:135,borderRadius:12,background:G.surface,display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,flexShrink:0}}>🎬</div>}\n              <div style={{flex:1}}>\n                <p style={{fontWeight:800,fontSize:17,lineHeight:1.3,marginBottom:6}}>{detail.title||detail.name}</p>\n                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>\n                  <span className="tag ta"><Ico n="star" size={11}/> {detail.vote_average?.toFixed(1)||"?"}</span>\n                  <span className="tag ti">{(detail.release_date||detail.first_air_date||"").slice(0,4)}</span>\n                </div>\n              </div>\n            </div>\n            {detail.overview&&<p style={{fontSize:14,color:G.muted,lineHeight:1.6,marginBottom:16}}>{detail.overview}</p>}\n            <button className="btn bp" style={{width:"100%",padding:"14px"}} onClick={()=>addToWatchlist(detail)} disabled={isAdded(detail)}>\n              {isAdded(detail)?"✓ Al in je watchlist":"+ Toevoegen aan watchlist"}\n            </button>\n          </div>\n        </div>\n      )}\n    </div>\n  );\n}\n\n// ─── SWITCH STRATEGY SCREEN ───────────────────────────────────────────────────\n\nfunction SwitchScreen({ user, subs, watchlist, savings, strategy, setStrategy, upgradePremium }) {\n\n  // Genereer plan op basis van watchlist binge-tijden + abonnementen\n  const generateStrategy = () => {\n    // Groepeer watchlist per platform met totale maanden\n    const platformMonths = {};\n    watchlist.filter(w=>w.status!=="finished").forEach(w=>{\n      if (!platformMonths[w.platform]) platformMonths[w.platform]=0;\n      if (w.type==="series") {\n        const b = calcBinge(w.episodes, w.epDuration||45, w.evenings||3);\n        platformMonths[w.platform] += b?.months||1;\n      } else {\n        platformMonths[w.platform] += 1;\n      }\n    });\n\n    // Sorteer op meeste maanden nodig\n    const sorted = Object.entries(platformMonths)\n      .sort((a,b)=>b[1]-a[1])\n      .map(([serviceId,months])=>({\n        serviceId,\n        months: Math.min(months, 4), // max 4 maanden per dienst per jaar\n        sub: subs.find(s=>s.serviceId===serviceId),\n        service: SERVICES.find(s=>s.id===serviceId),\n      }))\n      .filter(p=>p.service);\n\n    // Vul aan met actieve abonnementen die niet in watchlist zitten\n    subs.forEach(sub=>{\n      if (!sorted.find(p=>p.serviceId===sub.serviceId)) {\n        sorted.push({ serviceId:sub.serviceId, months:1, sub, service:SERVICES.find(s=>s.id===sub.serviceId) });\n      }\n    });\n\n    if (!sorted.length) { setStrategy({ plan:Array.from({length:12},(_,i)=>({month:i,type:"pause"})) }); return; }\n\n    // Bouw 12-maanden plan\n    const plan = [];\n    let monthIdx = 0;\n    for (const p of sorted) {\n      for (let m=0; m<p.months && monthIdx<12; m++,monthIdx++) {\n        plan.push({\n          month: monthIdx,\n          type: "active",\n          serviceId: p.serviceId,\n          svc: p.service,\n          price: p.sub?.price || p.service.price,\n        });\n      }\n    }\n    // Vul resterende maanden met pauze\n    while (plan.length < 12) {\n      plan.push({ month: plan.length, type:"pause" });\n    }\n    // Sorteer op maandnummer\n    plan.sort((a,b)=>a.month-b.month);\n    setStrategy({ plan });\n  };\n\n  if (!user.isPremium) return (\n    <div className="scr fu">\n      <div style={{padding:"20px 0 16px"}}>\n        <h2 style={{fontSize:22,fontWeight:800,letterSpacing:"-0.5px"}}>Switch Strategy</h2>\n        <p style={{color:G.muted,fontSize:14,marginTop:4}}>Roteer slim, betaal minder</p>\n      </div>\n      <div className="hero" style={{marginBottom:16}}>\n        <p style={{fontSize:13,color:"#7abf9a",marginBottom:6}}>Jij kunt besparen</p>\n        <div className="heroamt">{fmt(savings.huidigJaar*0.5)}</div>\n        <p style={{fontSize:13,color:"#7abf9a",marginTop:6}}>per jaar (schatting)</p>\n      </div>\n      <div className="card" style={{padding:20,marginBottom:14}}>\n        <p style={{fontWeight:700,marginBottom:12}}>Vergelijking</p>\n        <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,fontSize:14}}>\n          <span style={{color:G.muted}}>Huidig per jaar</span><span style={{fontWeight:700,color:G.danger}}>{fmt(savings.huidigJaar)}</span>\n        </div>\n        <div style={{display:"flex",justifyContent:"space-between",marginBottom:14,fontSize:14}}>\n          <span style={{color:G.muted}}>Met Switch Strategy</span><span style={{fontWeight:700,color:G.accent}}>{fmt(savings.huidigJaar*0.5)}</span>\n        </div>\n        <div style={{background:"#00e5a010",border:"1px solid #00e5a030",borderRadius:12,padding:14,textAlign:"center"}}>\n          <p style={{fontSize:18,color:G.accent,fontWeight:800}}>{fmt(savings.huidigJaar*0.5)} per jaar</p>\n          <p style={{fontSize:11,color:G.muted,marginTop:4}}>Exacte cijfers na upgraden</p>\n        </div>\n      </div>\n      <button className="btn bprem" style={{width:"100%",padding:"16px"}} onClick={upgradePremium}><Ico n="crown"/> Upgrade naar Premium — €10/jaar</button>\n    </div>\n  );\n\n  // Watchlist-gebaseerde aanbeveling\n  const wlItems = watchlist.filter(w=>w.status!=="finished");\n  const byPlatform = SERVICES.map(s=>({\n    ...s,\n    items: wlItems.filter(w=>w.platform===s.id),\n    totalMonths: wlItems.filter(w=>w.platform===s.id&&w.type==="series")\n      .reduce((sum,w)=>{ const b=calcBinge(w.episodes,w.epDuration||45,w.evenings||3); return sum+(b?.months||0); },0),\n  })).filter(s=>s.items.length>0);\n\n  return (\n    <div className="scr fu">\n      <div style={{padding:"20px 0 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>\n        <div>\n          <h2 style={{fontSize:22,fontWeight:800,letterSpacing:"-0.5px"}}>Switch Strategy</h2>\n          <span className="tag tp" style={{marginTop:4,display:"inline-flex"}}><Ico n="crown" size={12}/> Premium</span>\n        </div>\n        <button className="btn bp bsm" onClick={generateStrategy}>{strategy?"Herbereken":"Genereer Plan"}</button>\n      </div>\n\n      {/* Watchlist analyse */}\n      {byPlatform.length>0&&(\n        <div className="card" style={{padding:16,marginBottom:12}}>\n          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>\n            <Ico n="zap" size={16}/>\n            <p style={{fontWeight:700,fontSize:15}}>Watchlist analyse</p>\n          </div>\n          {byPlatform.map(s=>(\n            <div key={s.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:10,padding:"10px 12px",background:G.surface,borderRadius:12}}>\n              <div style={{width:36,height:36,borderRadius:10,background:s.color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{s.icon}</div>\n              <div style={{flex:1}}>\n                <p style={{fontWeight:600,fontSize:14}}>{s.name}</p>\n                <p style={{fontSize:12,color:G.muted}}>{s.items.length} titel{s.items.length!==1?"s":""}</p>\n              </div>\n              {s.totalMonths>0&&(\n                <div style={{textAlign:"right"}}>\n                  <p style={{fontWeight:700,color:G.accent,fontSize:14}}>{s.totalMonths} mnd</p>\n                  <p style={{fontSize:11,color:G.muted}}>nodig</p>\n                </div>\n              )}\n            </div>\n          ))}\n        </div>\n      )}\n\n      {!strategy?(\n        <div className="card" style={{padding:40,textAlign:"center",color:G.muted}}>\n          <p style={{fontSize:40,marginBottom:12}}>🔄</p>\n          <p style={{fontWeight:600,color:G.text,marginBottom:6}}>Klaar om te besparen?</p>\n          <p style={{fontSize:14}}>Klik "Genereer Plan" voor een jaarplanning gebaseerd op jouw watchlist en abonnementen.</p>\n        </div>\n      ):(\n        <>\n          <div className="hero" style={{marginBottom:14}}>\n            <p style={{fontSize:13,color:"#7abf9a",marginBottom:6}}>Jaarlijkse besparing</p>\n            <div className="heroamt">{fmt(savings.besparing)}</div>\n            <p style={{fontSize:13,color:"#7abf9a",marginTop:6}}>{fmt(savings.strategieJaar)} met plan vs {fmt(savings.huidigJaar)} huidig per jaar</p>\n          </div>\n          <div className="card" style={{padding:16,marginBottom:12}}>\n            <p style={{fontWeight:700,marginBottom:14}}>Jaarplanning</p>\n            <div className="mrow">\n              {strategy.plan.map(m=>(\n                <div key={m.month} className="chip" style={{background:m.type==="pause"?G.border:(m.svc?.color||G.muted)+"25",border:`1px solid ${m.type==="pause"?G.border:(m.svc?.color||G.muted)+"50"}`,color:m.type==="pause"?G.muted:G.text}}>\n                  <div style={{fontSize:16}}>{m.type==="pause"?"⏸":m.svc?.icon||"📺"}</div>\n                  <div style={{marginTop:4,fontWeight:700}}>{MONTHS[m.month]}</div>\n                  <div style={{fontSize:9,marginTop:2,opacity:.7}}>{m.type==="pause"?"Pauze":(m.svc?.name||"").split(" ")[0]}</div>\n                </div>\n              ))}\n            </div>\n          </div>\n          <div className="card" style={{padding:16}}>\n            <p style={{fontWeight:700,marginBottom:12}}>Breakdown per maand</p>\n            {strategy.plan.map((m,i)=>(\n              <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:`1px solid ${G.border}`}}>\n                <div style={{width:36,fontWeight:700,color:G.muted,fontSize:13}}>{MONTHS[m.month]}</div>\n                <div style={{fontSize:20}}>{m.type==="pause"?"⏸":m.svc?.icon||"📺"}</div>\n                <div style={{flex:1}}>\n                  <p style={{fontWeight:600,fontSize:14}}>{m.type==="pause"?"Pauze maand":m.svc?.name}</p>\n                  {m.type==="active"&&(()=>{\n                    const shows=wlItems.filter(w=>w.platform===m.serviceId);\n                    if(!shows.length) return null;\n                    return <p style={{fontSize:11,color:G.muted,marginTop:2}}>{shows.map(s=>s.title).join(", ")}</p>;\n                  })()}\n                </div>\n                <div style={{fontWeight:700,color:m.type==="pause"?G.accent:G.text}}>{m.type==="pause"?"€0":`€${m.price?.toFixed(2)}`}</div>\n              </div>\n            ))}\n            <div style={{display:"flex",justifyContent:"space-between",padding:"12px 0 0",fontWeight:800}}>\n              <span style={{color:G.muted}}>Totaal met Switch Strategy</span><span style={{color:G.accent}}>{fmt(savings.strategieJaar)}</span>\n            </div>\n            <div style={{display:"flex",justifyContent:"space-between",padding:"8px 0 0"}}>\n              <span style={{color:G.muted,fontSize:13}}>Besparing vs. huidig</span><span style={{color:G.accent,fontSize:13,fontWeight:700}}>{fmt(savings.besparing)}</span>\n            </div>\n          </div>\n        </>\n      )}\n    </div>\n  );\n}\n\n// ─── INSTELLINGEN ─────────────────────────────────────────────────────────────\n\nfunction SettingsScreen({ user, setUser, notifs, setNotifs, upgradePremium, openPwSheet }) {\n  return (\n    <div className="scr fu">\n      <div style={{padding:"20px 0 16px"}}>\n        <h2 style={{fontSize:22,fontWeight:800,letterSpacing:"-0.5px"}}>Instellingen</h2>\n      </div>\n      <div className="card" style={{marginBottom:14}}>\n        <div style={{padding:"16px 16px 12px"}}>\n          <p style={{fontSize:11,color:G.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",marginBottom:12}}>Account</p>\n          <p style={{fontSize:11,color:G.muted}}>E-mail</p>\n          <p style={{fontWeight:600,marginBottom:10}}>{user.email}</p>\n          <p style={{fontSize:11,color:G.muted}}>Plan</p>\n          <p style={{fontWeight:600,color:user.isPremium?G.premium:G.text}}>{user.isPremium?"⭐ Premium":"Gratis"}</p>\n        </div>\n        <div style={{height:1,background:G.border}}/>\n        <button className="btn bg" style={{margin:12,width:"calc(100% - 24px)",justifyContent:"flex-start"}} onClick={openPwSheet}>\n          <Ico n="lock"/><span style={{flex:1,textAlign:"left"}}>Wachtwoord wijzigen</span><Ico n="arrow"/>\n        </button>\n      </div>\n      {!user.isPremium&&(\n        <div style={{background:"linear-gradient(135deg,#1a1200,#0a0800)",border:`1px solid #3a2800`,borderRadius:18,padding:20,marginBottom:14}}>\n          <div style={{display:"flex",gap:12,marginBottom:14}}>\n            <div style={{fontSize:36}}>👑</div>\n            <div><p style={{fontWeight:800,fontSize:18}}>Upgrade naar Premium</p><p style={{fontSize:13,color:G.muted,marginTop:2}}>Slechts €10 per jaar</p></div>\n          </div>\n          {["Switch Strategy jaarplanner","Binge Calculator koppeling","Slimme verlengingsalerts","Bespaarteller"].map(f=>(\n            <div key={f} style={{display:"flex",gap:10,alignItems:"center",marginBottom:8}}>\n              <span style={{color:G.accent,flexShrink:0}}><Ico n="check"/></span>\n              <p style={{fontSize:14,color:G.muted}}>{f}</p>\n            </div>\n          ))}\n          <button className="btn bprem" style={{width:"100%",padding:"14px",marginTop:10}} onClick={upgradePremium}><Ico n="crown"/> Nu upgraden</button>\n        </div>\n      )}\n      <div className="card" style={{marginBottom:14}}>\n        <div style={{padding:16}}>\n          <p style={{fontSize:11,color:G.muted,fontWeight:700,textTransform:"uppercase",letterSpacing:"1px",marginBottom:14}}>Voorkeuren</p>\n          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>\n            <div>\n              <p style={{fontWeight:600}}>Meldingen {!user.isPremium&&<span className="tag tp" style={{marginLeft:6}}>Premium</span>}</p>\n              <p style={{fontSize:12,color:G.muted}}>Push bij bijna verlopen</p>\n            </div>\n            <Toggle value={notifs} onChange={v=>{setNotifs(v);LS.set("ss_notifs",v);}} disabled={!user.isPremium}/>\n          </div>\n        </div>\n      </div>\n      <button className="btn bg" style={{width:"100%",padding:"14px",color:G.danger}} onClick={()=>{setUser(null);LS.set("ss_user",null);}}>Uitloggen</button>\n      <p style={{textAlign:"center",fontSize:11,color:G.muted,marginTop:14}}>StreamSwitch v2.0</p>\n    </div>\n  );\n}\n\n// ─── SUBS SHEET ───────────────────────────────────────────────────────────────\n\nfunction SubSheet({ editingSub, subForm, setSubForm, saveSub, onClose }) {\n  const upd = (k,v) => setSubForm(f=>({...f,[k]:v}));\n  return (\n    <div className="ov" onClick={e=>e.target===e.currentTarget&&onClose()}>\n      <div className="sh">\n        <div className="hndl"/>\n        <h3 style={{fontWeight:800,fontSize:18,marginBottom:18}}>{editingSub?"Bewerken":"Toevoegen"}</h3>\n        {!editingSub&&(\n          <div style={{marginBottom:18}}>\n            <p style={{fontSize:12,color:G.muted,fontWeight:600,marginBottom:10}}>Kies een dienst</p>\n            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>\n              {SERVICES.map(p=>(\n                <button key={p.id} className="btn bsm" onClick={()=>upd("serviceId",p.id)||setSubForm(f=>({...f,serviceId:p.id,name:p.name,price:String(p.price),color:p.color,icon:p.icon,url:p.url}))}\n                  style={{background:subForm.serviceId===p.id?p.color:G.border,color:subForm.serviceId===p.id?"white":G.text}}>{p.icon} {p.name}</button>\n              ))}\n            </div>\n          </div>\n        )}\n        <div style={{display:"flex",flexDirection:"column",gap:13}}>\n          <div><label className="lbl">Naam</label><input className="inp" placeholder="Netflix" value={subForm.name} onChange={e=>upd("name",e.target.value)}/></div>\n          <div><label className="lbl">Maandprijs (€)</label><input className="inp" type="text" inputMode="decimal" placeholder="17.99" value={subForm.price} onChange={e=>upd("price",e.target.value)}/></div>\n          <div><label className="lbl">Verlengdatum</label><input className="inp" type="date" value={subForm.renewalDate} onChange={e=>upd("renewalDate",e.target.value)}/></div>\n          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",background:G.surface,borderRadius:11,border:`1px solid ${G.border}`}}>\n            <p style={{fontWeight:600}}>Auto-verlengen</p>\n            <Toggle value={subForm.autoRenew} onChange={v=>upd("autoRenew",v)}/>\n          </div>\n          <button className="btn bp" style={{width:"100%",padding:"14px"}} onClick={saveSub}>{editingSub?"Opslaan":"Toevoegen"}</button>\n          <button className="btn bg" style={{width:"100%"}} onClick={onClose}>Annuleren</button>\n        </div>\n      </div>\n    </div>\n  );\n}\n\n// ─── WACHTWOORD SHEET ─────────────────────────────────────────────────────────\n\nfunction PwSheet({ user, setUser, onClose }) {\n  const [form,setForm]=useState({current:"",next:"",confirm:""});\n  const [err,setErr]=useState("");\n  const [ok,setOk]=useState(false);\n  const [show,setShow]=useState({current:false,next:false,confirm:false});\n  const save=()=>{\n    setErr("");\n    if(!form.current||!form.next||!form.confirm){setErr("Vul alle velden in.");return;}\n    if(form.current!==user.password){setErr("Huidig wachtwoord klopt niet.");return;}\n    if(form.next.length<6){setErr("Minimaal 6 tekens.");return;}\n    if(form.next!==form.confirm){setErr("Wachtwoorden komen niet overeen.");return;}\n    setUser(u=>{const n={...u,password:form.next};LS.set("ss_user",n);return n;});\n    setOk(true); setTimeout(()=>onClose(),1600);\n  };\n  return (\n    <div className="ov" onClick={e=>e.target===e.currentTarget&&onClose()}>\n      <div className="sh">\n        <div className="hndl"/>\n        <h3 style={{fontWeight:800,fontSize:18,marginBottom:20}}>Wachtwoord wijzigen</h3>\n        {ok?<div style={{textAlign:"center",padding:"30px 0"}}><p style={{fontSize:52,marginBottom:12}}>✅</p><p style={{fontWeight:700,color:G.accent,fontSize:18}}>Wachtwoord gewijzigd!</p></div>:(\n          <div style={{display:"flex",flexDirection:"column",gap:13}}>\n            {[{k:"current",l:"Huidig wachtwoord",p:"••••••••",a:"current-password"},{k:"next",l:"Nieuw wachtwoord",p:"Minimaal 6 tekens",a:"new-password"},{k:"confirm",l:"Bevestigen",p:"Herhaal wachtwoord",a:"new-password"}].map(({k,l,p,a})=>(\n              <div key={k}><label className="lbl">{l}</label>\n                <div className="iw">\n                  <input className="inp" type={show[k]?"text":"password"} placeholder={p} autoComplete={a} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))}/>\n                  <button className="eyeb" onClick={()=>setShow(v=>({...v,[k]:!v[k]}))} tabIndex={-1}><Ico n={show[k]?"eyeoff":"eye"}/></button>\n                </div>\n              </div>\n            ))}\n            {err&&<p style={{color:G.danger,fontSize:13,background:"#2a1020",padding:"10px 14px",borderRadius:10}}>{err}</p>}\n            <button className="btn bp" style={{width:"100%",padding:"14px"}} onClick={save}>Opslaan</button>\n            <button className="btn bg" style={{width:"100%"}} onClick={onClose}>Annuleren</button>\n          </div>\n        )}\n      </div>\n    </div>\n  );\n}\n\n// ─── MAIN APP ─────────────────────────────────────────────────────────────────\n\nfunction StreamSwitch() {\n  const [user,        setUser]        = useState(()=>LS.get("ss_user",null));\n  const [authMode,    setAuthMode]    = useState("login");\n  const [authEmail,   setAuthEmail]   = useState("");\n  const [authPass,    setAuthPass]    = useState("");\n  const [authError,   setAuthError]   = useState("");\n  const [showAuthPass,setShowAuthPass]= useState(false);\n  const [tab,         setTab]         = useState("dashboard");\n  const [subs,        setSubs]        = useState(()=>LS.get("ss_subs",DEF_SUBS));\n  const [showSubSheet,setShowSubSheet]= useState(false);\n  const [editingSub,  setEditingSub]  = useState(null);\n  const [subForm,     setSubForm]     = useState({serviceId:"",name:"",price:"",renewalDate:addDays(30),autoRenew:true,color:"#00e5a0",icon:"📺",url:""});\n  const [watchlist,   setWatchlist]   = useState(()=>LS.get("ss_watchlist",DEF_WL));\n  const [strategy,    setStrategy]    = useState(null);\n  const [notifs,      setNotifs]      = useState(()=>LS.get("ss_notifs",true));\n  const [showPwSheet, setShowPwSheet] = useState(false);\n\n  const totalMonthly = useMemo(()=>subs.reduce((s,a)=>s+a.price,0),[subs]);\n  const savings      = useMemo(()=>calcSavings(subs,strategy?.plan),[subs,strategy]);\n\n  const getStatus = (sub) => {\n    const wlCount=watchlist.filter(w=>w.platform===sub.serviceId&&w.status!=="finished").length;\n    if(!sub.autoRenew) return {label:"Inactief",cls:"ti",dot:G.muted};\n    if(daysLeft(sub.renewalDate)<=30&&wlCount===0) return {label:"Laag gebruik",cls:"tl",dot:G.warn};\n    return {label:"Actief",cls:"ta",dot:G.accent};\n  };\n\n  const upgradePremium = ()=>setUser(u=>{const n={...u,isPremium:true};LS.set("ss_user",n);return n;});\n\n  const handleAuth = ()=>{\n    if(!authEmail.trim()||!authPass.trim()){setAuthError("Vul alle velden in.");return;}\n    if(authPass.length<6){setAuthError("Wachtwoord minimaal 6 tekens.");return;}\n    const u={id:genId(),email:authEmail,isPremium:false,password:authPass};\n    setUser(u); LS.set("ss_user",u);\n  };\n\n  const openAddSub  = ()=>{setEditingSub(null);setSubForm({serviceId:"",name:"",price:"",renewalDate:addDays(30),autoRenew:true,color:"#00e5a0",icon:"📺",url:""});setShowSubSheet(true);};\n  const openEditSub = (s)=>{setEditingSub(s);setSubForm({...s,price:String(s.price)});setShowSubSheet(true);};\n  const saveSub = ()=>{\n    if(!subForm.name.trim()||!subForm.price) return;\n    const preset=SERVICES.find(p=>p.id===subForm.serviceId);\n    const s={id:editingSub?.id||genId(),serviceId:subForm.serviceId,name:subForm.name,price:parseFloat(subForm.price.replace(",",".")),renewalDate:subForm.renewalDate,autoRenew:subForm.autoRenew,color:preset?.color||subForm.color,icon:preset?.icon||subForm.icon,url:preset?.url||subForm.url};\n    setSubs(prev=>{const n=editingSub?prev.map(x=>x.id===editingSub.id?s:x):[...prev,s];LS.set("ss_subs",n);return n;});\n    setShowSubSheet(false); setStrategy(null);\n  };\n\n  const NAV = [\n    {id:"dashboard",label:"Dashboard",   icon:"dashboard"},\n    {id:"subs",     label:"Abonnementen",icon:"subs"     },\n    {id:"watchlist",label:"Watchlist",   icon:"list"     },\n    {id:"news",     label:"Nieuws",      icon:"film"     },\n    {id:"switch",   label:"Switch",      icon:"switch"   },\n  ];\n\n  // Auth scherm\n  if (!user) return (\n    <div style={{minHeight:"100vh",background:G.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24}}>\n      <style>{CSS}</style>\n      <div style={{textAlign:"center",marginBottom:36}}>\n        <div style={{fontSize:52,marginBottom:10}}>📺</div>\n        <h1 style={{fontSize:32,fontWeight:900,letterSpacing:"-1px",color:G.text}}>Stream<span style={{color:G.accent}}>Switch</span></h1>\n        <p style={{color:G.muted,marginTop:8,fontSize:15}}>Smart streaming. Smarter spending.</p>\n      </div>\n      <div style={{width:"100%",maxWidth:360,display:"flex",flexDirection:"column",gap:12}}>\n        <div style={{display:"flex",background:G.surface,borderRadius:12,padding:4,border:`1px solid ${G.border}`}}>\n          {["login","register"].map(m=>(\n            <button key={m} onClick={()=>setAuthMode(m)} style={{flex:1,padding:"9px",border:"none",cursor:"pointer",fontFamily:"Outfit,sans-serif",fontWeight:600,fontSize:14,borderRadius:9,background:authMode===m?G.card:"transparent",color:authMode===m?G.text:G.muted}}>\n              {m==="login"?"Inloggen":"Registreren"}\n            </button>\n          ))}\n        </div>\n        <input className="inp" type="email" placeholder="E-mailadres" value={authEmail} onChange={e=>setAuthEmail(e.target.value)} autoComplete="email"/>\n        <div className="iw">\n          <input className="inp" type={showAuthPass?"text":"password"} placeholder="Wachtwoord" value={authPass} onChange={e=>setAuthPass(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleAuth()} autoComplete={authMode==="login"?"current-password":"new-password"}/>\n          <button className="eyeb" onClick={()=>setShowAuthPass(v=>!v)} tabIndex={-1}><Ico n={showAuthPass?"eyeoff":"eye"}/></button>\n        </div>\n        {authError&&<p style={{color:G.danger,fontSize:13}}>{authError}</p>}\n        <button className="btn bp" style={{width:"100%",padding:"14px"}} onClick={handleAuth}>{authMode==="login"?"Inloggen":"Account aanmaken"}</button>\n        <p style={{textAlign:"center",fontSize:12,color:G.muted}}>Probeer gratis — geen creditcard nodig</p>\n      </div>\n    </div>\n  );\n\n  return (\n    <div className="ss">\n      <style>{CSS}</style>\n      {tab==="dashboard" && <Dashboard user={user} subs={subs} watchlist={watchlist} savings={savings} totalMonthly={totalMonthly} getStatus={getStatus} setSubs={setSubs} setTab={setTab} upgradePremium={upgradePremium}/>}\n      {tab==="subs"      && <SubsScreen subs={subs} setSubs={setSubs} watchlist={watchlist} savings={savings} totalMonthly={totalMonthly} getStatus={getStatus} openAddSub={openAddSub} openEditSub={openEditSub}/>}\n      {tab==="watchlist" && <WatchScreen watchlist={watchlist} setWatchlist={setWatchlist}/>}\n      {tab==="news"      && <NewsScreen  watchlist={watchlist} setWatchlist={setWatchlist} subs={subs}/>}\n      {tab==="switch"    && <SwitchScreen user={user} subs={subs} watchlist={watchlist} savings={savings} strategy={strategy} setStrategy={setStrategy} upgradePremium={upgradePremium}/>}\n      {tab==="settings"  && <SettingsScreen user={user} setUser={setUser} notifs={notifs} setNotifs={setNotifs} upgradePremium={upgradePremium} openPwSheet={()=>setShowPwSheet(true)}/>}\n\n      <nav className="nav">\n        {NAV.map(({id,label,icon})=>(\n          <button key={id} className={`nb${tab===id?" on":""}`} onClick={()=>setTab(id)}>\n            <Ico n={icon} size={22}/><span>{label}</span>\n          </button>\n        ))}\n      </nav>\n\n      {showSubSheet && <SubSheet editingSub={editingSub} subForm={subForm} setSubForm={setSubForm} saveSub={saveSub} onClose={()=>setShowSubSheet(false)}/>}\n      {showPwSheet  && <PwSheet  user={user} setUser={setUser} onClose={()=>setShowPwSheet(false)}/>}\n    </div>\n  );\n}\n\nconst root = ReactDOM.createRoot(document.getElementById("root"));\nroot.render(<StreamSwitch/>);\n';

loadScript(‘https://unpkg.com/react@18/umd/react.production.min.js’, function() {
loadScript(‘https://unpkg.com/react-dom@18/umd/react-dom.production.min.js’, function() {
loadScript(‘https://unpkg.com/@babel/standalone/babel.min.js’, function() {
try {
var compiled = Babel.transform(APP_CODE, {
presets: [‘react’],
filename: ‘app.jsx’
}).code;
var el = document.getElementById(‘ss-loading’);
if (el) el.style.display = ‘none’;
eval(compiled);
} catch(e) {
showError(e.message);
}
});
});
});
</script>
