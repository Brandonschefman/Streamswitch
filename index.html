// ── Binge berekening ──────────────────────────────────────────────────────────
// Geeft terug hoeveel weken nodig zijn om een show af te kijken
// en hoeveel abonnementsmaanden dat betekent
const calcBinge = (episodes, epDuration, eveningsPerWeek, minsPerEvening=120) => {
if (!episodes || episodes < 1) return null;
const totalMins   = episodes * epDuration;
const minsPerWeek = eveningsPerWeek * minsPerEvening;
const weeks       = Math.ceil(totalMins / minsPerWeek);
const months      = Math.ceil(weeks / 4.3);
return { totalMins, weeks, months };
};

// ── Centrale besparingsberekening ────────────────────────────────────────────
const calcSavings = (subs, plan) => {
const huidigJaar = subs.reduce((s,a)=>s+a.price,0)*12;
if (!plan?.length) return { huidigJaar, strategieJaar:null, besparing:null };
const strategieJaar = plan.filter(m=>m.type===“active”).reduce((s,m)=>s+m.price,0);
return { huidigJaar, strategieJaar, besparing:Math.max(0,huidigJaar-strategieJaar) };
};

const a=document.createElement(“a”); a.href=deepLink; a.style.display=“none”;
document.body.appendChild(a); a.click(); document.body.removeChild(a);
const t=setTimeout(()=>window.open(url,”_blank”),1800);
window.addEventListener(“blur”,()=>clearTimeout(t),{once:true});
};

const totalMonthly = useMemo(()=>subs.reduce((s,a)=>s+a.price,0),[subs]);
const savings      = useMemo(()=>calcSavings(subs,strategy?.plan),[subs,strategy]);

const getStatus = (sub) => {
const wlCount=watchlist.filter(w=>w.platform===sub.serviceId&&w.status!==“finished”).length;
if(!sub.autoRenew) return {label:“Inactief”,cls:“ti”,dot:G.muted};
if(daysLeft(sub.renewalDate)<=30&&wlCount===0) return {label:“Laag gebruik”,cls:“tl”,dot:G.warn};
return {label:“Actief”,cls:“ta”,dot:G.accent};
};

const upgradePremium = ()=>setUser(u=>{const n={…u,isPremium:true};LS.set(“ss_user”,n);return n;});

const handleAuth = ()=>{
if(!authEmail.trim()||!authPass.trim()){setAuthError(“Vul alle velden in.”);return;}
if(authPass.length<6){setAuthError(“Wachtwoord minimaal 6 tekens.”);return;}
const u={id:genId(),email:authEmail,isPremium:false,password:authPass};
setUser(u); LS.set(“ss_user”,u);
};

const openAddSub  = ()=>{setEditingSub(null);setSubForm({serviceId:””,name:””,price:””,renewalDate:addDays(30),autoRenew:true,color:”#00e5a0”,icon:“📺”,url:””});setShowSubSheet(true);};
const openEditSub = (s)=>{setEditingSub(s);setSubForm({…s,price:String(s.price)});setShowSubSheet(true);};
const saveSub = ()=>{
if(!subForm.name.trim()||!subForm.price) return;
const preset=SERVICES.find(p=>p.id===subForm.serviceId);
const s={id:editingSub?.id||genId(),serviceId:subForm.serviceId,name:subForm.name,price:parseFloat(subForm.price.replace(”,”,”.”)),renewalDate:subForm.renewalDate,autoRenew:subForm.autoRenew,color:preset?.color||subForm.color,icon:preset?.icon||subForm.icon,url:preset?.url||subForm.url};
setSubs(prev=>{const n=editingSub?prev.map(x=>x.id===editingSub.id?s:x):[…prev,s];LS.set(“ss_subs”,n);return n;});
setShowSubSheet(false); setStrategy(null);
};

const NAV = [
{id:“dashboard”,label:“Dashboard”,   icon:“dashboard”},
{id:“subs”,     label:“Abonnementen”,icon:“subs”     },
{id:“watchlist”,label:“Watchlist”,   icon:“list”     },
{id:“news”,     label:“Nieuws”,      icon:“film”     },
{id:“switch”,   label:“Switch”,      icon:“switch”   },
];

// Auth scherm
if (!user) return (
<div style={{minHeight:“100vh”,background:G.bg,display:“flex”,flexDirection:“column”,alignItems:“center”,justifyContent:“center”,padding:24}}>
<style>{CSS}</style>
<div style={{textAlign:“center”,marginBottom:36}}>
<div style={{fontSize:52,marginBottom:10}}>📺</div>
<h1 style={{fontSize:32,fontWeight:900,letterSpacing:”-1px”,color:G.text}}>Stream<span style={{color:G.accent}}>Switch</span></h1>
<p style={{color:G.muted,marginTop:8,fontSize:15}}>Smart streaming. Smarter spending.</p>
</div>
<div style={{width:“100%”,maxWidth:360,display:“flex”,flexDirection:“column”,gap:12}}>
<div style={{display:“flex”,background:G.surface,borderRadius:12,padding:4,border:`1px solid ${G.border}`}}>
{[“login”,“register”].map(m=>(
<button key={m} onClick={()=>setAuthMode(m)} style={{flex:1,padding:“9px”,border:“none”,cursor:“pointer”,fontFamily:“Outfit,sans-serif”,fontWeight:600,fontSize:14,borderRadius:9,background:authMode===m?G.card:“transparent”,color:authMode===m?G.text:G.muted}}>
{m===“login”?“Inloggen”:“Registreren”}
</button>
))}
</div>
<input className=“inp” type=“email” placeholder=“E-mailadres” value={authEmail} onChange={e=>setAuthEmail(e.target.value)} autoComplete=“email”/>
<div className="iw">
<input className=“inp” type={showAuthPass?“text”:“password”} placeholder=“Wachtwoord” value={authPass} onChange={e=>setAuthPass(e.target.value)} onKeyDown={e=>e.key===“Enter”&&handleAuth()} autoComplete={authMode===“login”?“current-password”:“new-password”}/>
<button className=“eyeb” onClick={()=>setShowAuthPass(v=>!v)} tabIndex={-1}><Ico n={showAuthPass?“eyeoff”:“eye”}/></button>
</div>
{authError&&<p style={{color:G.danger,fontSize:13}}>{authError}</p>}
<button className=“btn bp” style={{width:“100%”,padding:“14px”}} onClick={handleAuth}>{authMode===“login”?“Inloggen”:“Account aanmaken”}</button>
<p style={{textAlign:“center”,fontSize:12,color:G.muted}}>Probeer gratis — geen creditcard nodig</p>
</div>
</div>
);

return (
<div className="ss">
<style>{CSS}</style>
{tab===“dashboard” && <Dashboard user={user} subs={subs} watchlist={watchlist} savings={savings} totalMonthly={totalMonthly} getStatus={getStatus} setSubs={setSubs} setTab={setTab} upgradePremium={upgradePremium}/>}
{tab===“subs”      && <SubsScreen subs={subs} setSubs={setSubs} watchlist={watchlist} savings={savings} totalMonthly={totalMonthly} getStatus={getStatus} openAddSub={openAddSub} openEditSub={openEditSub}/>}
{tab===“watchlist” && <WatchScreen watchlist={watchlist} setWatchlist={setWatchlist}/>}
{tab===“news”      && <NewsScreen  watchlist={watchlist} setWatchlist={setWatchlist} subs={subs}/>}
{tab===“switch”    && <SwitchScreen user={user} subs={subs} watchlist={watchlist} savings={savings} strategy={strategy} setStrategy={setStrategy} upgradePremium={upgradePremium}/>}
{tab===“settings”  && <SettingsScreen user={user} setUser={setUser} notifs={notifs} setNotifs={setNotifs} upgradePremium={upgradePremium} openPwSheet={()=>setShowPwSheet(true)}/>}

```
  <nav className="nav">
    {NAV.map(({id,label,icon})=>(
      <button key={id} className={`nb${tab===id?" on":""}`} onClick={()=>setTab(id)}>
        <Ico n={icon} size={22}/><span>{label}</span>
      </button>
    ))}
  </nav>

  {showSubSheet && <SubSheet editingSub={editingSub} subForm={subForm} setSubForm={setSubForm} saveSub={saveSub} onClose={()=>setShowSubSheet(false)}/>}
  {showPwSheet  && <PwSheet  user={user} setUser={setUser} onClose={()=>setShowPwSheet(false)}/>}
</div>
```

);
}

const root = ReactDOM.createRoot(document.getElementById(“root”));
root.render(<StreamSwitch/>);
</script>

</body>
</html>
